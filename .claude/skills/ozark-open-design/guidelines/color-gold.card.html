<!-- @dsCard group="Colors" viewport="700x180" name="Brand — Clubhouse Gold" subtitle="Accent #FDDA00; use gold-600 for AA text on light" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #faf8f2; font-family: "Montserrat", system-ui, sans-serif; padding: 20px; }
  .swatches { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(30,31,51,.08); }
  .sw { height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw .n { font-size: 11px; font-weight: 700; }
  .sw .h { font-size: 10px; opacity: .9; font-variant-numeric: tabular-nums; }
  .base { outline: 3px solid #312f8c; outline-offset: -3px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw" style="background:#a07f00;color:#fff"><span class="n">700</span><span class="h">#A07F00</span></div>
  <div class="sw" style="background:#c9a300;color:#fff"><span class="n">600 ·text</span><span class="h">#C9A300</span></div>
  <div class="sw" style="background:#e6c200;color:#1c1b52"><span class="n">500</span><span class="h">#E6C200</span></div>
  <div class="sw base" style="background:#fdda00;color:#1c1b52"><span class="n">400 ·base</span><span class="h">#FDDA00</span></div>
  <div class="sw" style="background:#ffe74d;color:#1c1b52"><span class="n">300</span><span class="h">#FFE74D</span></div>
  <div class="sw" style="background:#fff29c;color:#a07f00"><span class="n">200</span><span class="h">#FFF29C</span></div>
  <div class="sw" style="background:#fff8cf;color:#a07f00"><span class="n">100</span><span class="h">#FFF8CF</span></div>
</div>
</body>
</html>
