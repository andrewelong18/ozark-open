<!-- @dsCard group="Colors" viewport="700x170" name="Warm Neutrals & Surfaces" subtitle="Cream page, white cards, ink text — tuned for sunlight contrast" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #faf8f2; font-family: "Montserrat", system-ui, sans-serif; padding: 20px; }
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(30,31,51,.08); border: 1px solid #e0dfd7; }
  .sw { height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw .n { font-size: 11px; font-weight: 700; }
  .sw .h { font-size: 9px; opacity: .85; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw" style="background:#ffffff;color:#2b2c40"><span class="n">card</span><span class="h">#FFFFFF</span></div>
  <div class="sw" style="background:#faf8f2;color:#2b2c40"><span class="n">page 50</span><span class="h">#FAF8F2</span></div>
  <div class="sw" style="background:#f4f2ea;color:#2b2c40"><span class="n">sunken 100</span><span class="h">#F4F2EA</span></div>
  <div class="sw" style="background:#e0dfd7;color:#2b2c40"><span class="n">border 200</span><span class="h">#E0DFD7</span></div>
  <div class="sw" style="background:#6f7082;color:#fff"><span class="n">muted 500</span><span class="h">#6F7082</span></div>
  <div class="sw" style="background:#3d3e52;color:#fff"><span class="n">body 700</span><span class="h">#3D3E52</span></div>
  <div class="sw" style="background:#1e1f33;color:#fff"><span class="n">900</span><span class="h">#1E1F33</span></div>
  <div class="sw" style="background:#16172a;color:#fff"><span class="n">strong 950</span><span class="h">#16172A</span></div>
</div>
</body>
</html>
