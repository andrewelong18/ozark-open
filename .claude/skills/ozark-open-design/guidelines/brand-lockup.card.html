<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); padding: 24px; display: flex; gap: 32px; align-items: center; }
  .lockup { height: 240px; width: auto; }
  .note { max-width: 260px; }
  .note h4 { font-family: var(--font-display); color: var(--indigo-700); font-size: 20px; margin: 0 0 8px; }
  .note p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0 0 8px; }
</style>
</head>
<body>
  <img class="lockup" src="../assets/logos/ozark-lockup.png" alt="Ozark Open Sportsbook lockup" />
  <div class="note">
    <h4>The Mark</h4>
    <p>The state of Missouri, tiled with money bags, with a golf flag through the hole — clubhouse meets sportsbook. Indigo <b>#312F8C</b>, gold <b>#FDDA00</b>, money green.</p>
    <p>Wordmark is set in Azalea. Clear space: keep at least the flag-height around all sides.</p>
  </div>
</body>
</html>
