<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Soft, low, clubby — never neon glow. Plus focus & gold-press." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #f4f2ea; font-family: "Montserrat", system-ui, sans-serif; padding: 28px; }
  .row { display: flex; gap: 24px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 62px; background: #fff; border-radius: 12px; }
  .n { font-size: 11px; font-weight: 700; color: #3d3e52; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:0 1px 2px rgba(30,31,51,.06)"></div><span class="n">xs</span></div>
  <div class="item"><div class="box" style="box-shadow:0 1px 3px rgba(30,31,51,.08),0 1px 2px rgba(30,31,51,.04)"></div><span class="n">sm · cards</span></div>
  <div class="item"><div class="box" style="box-shadow:0 4px 12px rgba(30,31,51,.08),0 1px 3px rgba(30,31,51,.05)"></div><span class="n">md · lifted</span></div>
  <div class="item"><div class="box" style="box-shadow:0 12px 28px rgba(30,31,51,.12),0 2px 6px rgba(30,31,51,.06)"></div><span class="n">lg · modal</span></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 3px rgba(82,79,192,.35)"></div><span class="n">focus ring</span></div>
  <div class="item"><div class="box" style="box-shadow:0 0 0 3px rgba(253,218,0,.4)"></div><span class="n">gold press</span></div>
</div>
</body>
</html>
