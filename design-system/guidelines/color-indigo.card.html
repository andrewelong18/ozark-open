<!-- @dsCard group="Colors" viewport="700x180" name="Brand — Indigo" subtitle="Primary #312F8C and its scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #faf8f2; font-family: "Montserrat", system-ui, sans-serif; padding: 20px; }
  .swatches { display: grid; grid-template-columns: repeat(9, 1fr); gap: 0; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(30,31,51,.08); }
  .sw { height: 88px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
  .sw .n { font-size: 11px; font-weight: 700; }
  .sw .h { font-size: 10px; opacity: .85; font-variant-numeric: tabular-nums; }
  .base { outline: 3px solid #fdda00; outline-offset: -3px; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw" style="background:#1c1b52;color:#fff"><span class="n">900</span><span class="h">#1C1B52</span></div>
  <div class="sw" style="background:#262573;color:#fff"><span class="n">800</span><span class="h">#262573</span></div>
  <div class="sw base" style="background:#312f8c;color:#fff"><span class="n">700 ·base</span><span class="h">#312F8C</span></div>
  <div class="sw" style="background:#3f3da6;color:#fff"><span class="n">600</span><span class="h">#3F3DA6</span></div>
  <div class="sw" style="background:#524fc0;color:#fff"><span class="n">500</span><span class="h">#524FC0</span></div>
  <div class="sw" style="background:#7d7ad6;color:#fff"><span class="n">400</span><span class="h">#7D7AD6</span></div>
  <div class="sw" style="background:#a6a4e6;color:#1c1b52"><span class="n">300</span><span class="h">#A6A4E6</span></div>
  <div class="sw" style="background:#e6e5fa;color:#262573"><span class="n">100</span><span class="h">#E6E5FA</span></div>
  <div class="sw" style="background:#f2f1fc;color:#262573"><span class="n">50</span><span class="h">#F2F1FC</span></div>
</div>
</body>
</html>
