<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid — --space-1 … --space-16" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #fff; font-family: "Montserrat", system-ui, sans-serif; padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #524fc0; border-radius: 3px; width: 16px; }
  .n { font-size: 11px; font-weight: 700; color: #3d3e52; font-variant-numeric: tabular-nums; }
  .t { font-size: 10px; color: #6f7082; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><span class="n">4</span><span class="t">1</span></div>
  <div class="item"><div class="bar" style="height:8px"></div><span class="n">8</span><span class="t">2</span></div>
  <div class="item"><div class="bar" style="height:12px"></div><span class="n">12</span><span class="t">3</span></div>
  <div class="item"><div class="bar" style="height:16px"></div><span class="n">16</span><span class="t">4</span></div>
  <div class="item"><div class="bar" style="height:24px"></div><span class="n">24</span><span class="t">6</span></div>
  <div class="item"><div class="bar" style="height:32px"></div><span class="n">32</span><span class="t">8</span></div>
  <div class="item"><div class="bar" style="height:48px"></div><span class="n">48</span><span class="t">12</span></div>
  <div class="item"><div class="bar" style="height:64px"></div><span class="n">64</span><span class="t">16</span></div>
</div>
</body>
</html>
